<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Quiz Audience - Modern Blue</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg: #f4f7f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: Quiz */
        .quiz-panel {
            flex: 2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 2px solid #ddd;
        }

        .nav-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .img-container {
            width: 100%;
            max-width: 500px;
            height: 350px;
            background: #eee;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 25px;
        }

        .opt {
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Right Side: Scoreboard */
        .score-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .timer-box {
            font-size: 3rem;
            font-weight: bold;
            color: #d9534f;
            text-align: center;
            padding: 20px;
            border-bottom: 3px solid #eee;
            margin-bottom: 20px;
        }

        .chart-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-bottom: 40px;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--primary), #00aaff);
            border-radius: 8px 8px 0 0;
            transition: height 0.5s ease;
            position: relative;
        }

        .bar-label {
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .score-val {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }

        .opt.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Intro Screen */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0056b3 0%, #00aaff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 30px;
        }

        .intro-screen.hidden {
            display: none;
        }

        .intro-content {
            text-align: center;
            color: white;
        }

        .intro-content h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .intro-content p {
            font-size: 1.3rem;
            margin: 20px 0 0 0;
            opacity: 0.95;
        }

        .start-button {
            padding: 20px 60px;
            font-size: 1.5rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .start-button:hover {
            background: #218838;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .start-button:active {
            transform: scale(0.98);
        }

        body.quiz-active {
            display: flex;
        }
    </style>
</head>

<body>

    <div class="intro-screen" id="intro-screen">
        <div class="intro-content">
            <h1>Tebak Gambar</h1>
            <p>Siap untuk mengikuti kuis?</p>
        </div>
        <button class="start-button" onclick="startQuiz()">Mulai</button>
    </div>

    <div class="quiz-panel">
        <div class="nav-header">
            <h2 id="soal-num">Soal #1</h2>
        </div>
        <div class="img-container">
            <img id="quiz-img" src="" alt="Soal Gambar">
        </div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div class="score-panel">
        <div class="timer-box" id="timer-display">00:00</div>
        <div class="chart-container" id="chart-container">
        </div>
    </div>

    <audio id="timer-sound" loop>
        <source src="10sec_sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let timerInterval;
        let correctAnswer = null;
        let soundPlaying = false;
        const timerSound = document.getElementById('timer-sound');

        function hideIntroScreen() {
            const introScreen = document.getElementById('intro-screen');
            introScreen.classList.add('hidden');
            localStorage.setItem('quizStarted', 'true');
        }

        function startQuiz() {
            hideIntroScreen();
            updateDisplay();
            startTimer();
        }

        function updateDisplay() {
            const quizData = JSON.parse(localStorage.getItem('quizData') || '{}');
            const participants = JSON.parse(localStorage.getItem('participants') || '[]');
            const currentSoalIdx = parseInt(localStorage.getItem('currentSoalIdx') || 0, 10);

            // Update Soal
            fetch('soal.json')
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        console.error('Data soal tidak valid');
                        return;
                    }
                    // Validasi index - jika melampaui, reset ke 0
                    let validIdx = currentSoalIdx;
                    if (currentSoalIdx >= data.length) {
                        console.error(`Soal pada index ${currentSoalIdx} tidak ditemukan. Total soal: ${data.length}`);
                        validIdx = 0;
                        localStorage.setItem('currentSoalIdx', 0);
                    }
                    const s = data[validIdx];
                    if (s) {
                        document.getElementById('soal-num').innerText = `Soal #${s.id}`;
                        document.getElementById('quiz-img').src = s.gambar;
                        correctAnswer = s.jawaban; // Simpan jawaban benar
                        document.getElementById('options-container').innerHTML = s.opsi.map((o, i) =>
                            `<div class="opt" data-answer="${String.fromCharCode(65 + i)}">${String.fromCharCode(65 + i)}. ${o}</div>`
                        ).join('');
                    } else {
                        console.error(`Soal pada index ${validIdx} tidak ditemukan`);
                        document.getElementById('options-container').innerHTML = '<p style="color:red;">Error: Soal tidak valid. Silakan refresh halaman.</p>';
                    }
                })
                .catch(error => {
                    console.error('Error loading soal.json:', error);
                    document.getElementById('options-container').innerHTML = '<p style="color:red;">Error: Gagal memuat soal. Pastikan soal.json ada di folder yang sama.</p>';
                });

            // Update Chart
            const chart = document.getElementById('chart-container');
            chart.innerHTML = participants.map(p => `
            <div class="bar-wrapper">
                <div class="bar" style="height: ${p.score * 2}px">
                    <div class="score-val">${p.score}</div>
                </div>
                <div class="bar-label">${p.name}</div>
            </div>
        `).join('');
        }

        function revealCorrectAnswer() {
            if (correctAnswer) {
                const options = document.querySelectorAll('.opt');
                options.forEach(opt => {
                    if (opt.getAttribute('data-answer') === correctAnswer) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerSound.pause();
            timerSound.currentTime = 0;
            soundPlaying = false;

            let time = parseInt(localStorage.getItem('timerValue') || 60);

            timerInterval = setInterval(() => {
                if (time <= 0) {
                    clearInterval(timerInterval);
                    timerSound.pause();
                    soundPlaying = false;
                    revealCorrectAnswer();
                    return;
                }
                time--;
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                document.getElementById('timer-display').innerText =
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                // Play sound when time <= 10 seconds
                if (time <= 10 && !soundPlaying) {
                    timerSound.play();
                    soundPlaying = true;
                } else if (time > 10 && soundPlaying) {
                    timerSound.pause();
                    timerSound.currentTime = 0;
                    soundPlaying = false;
                }
            }, 1000);
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'triggerNext') {
                hideIntroScreen();
                startTimer();
            }
            updateDisplay();
        });

        // Initial Load
        const quizStarted = localStorage.getItem('quizStarted') === 'true';
        if (quizStarted) {
            hideIntroScreen();
        }
        updateDisplay();
    </script>
</body>

</html>
